<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LUX 2.0 — Design System Viewer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,'Inter',sans-serif;-webkit-font-smoothing:antialiased;}

:root {
  --bg:       #141516;
  --sidebar:  #1A1B1E;
  --surface:  #232425;
  --card:     #2A2B2E;
  --border:   #333537;
  --border-m: #44474A;
  --ink:      #F0F2F4;
  --ink-2:    #B8BEC4;
  --ink-3:    #737B83;
  --blue:     #66AFFF;
  --blue-bg:  rgba(102,175,255,.1);
  --blue-bdr: rgba(102,175,255,.2);
  --r:        6px;
}

/* ── APP SHELL ── */
#app {
  display: flex;
  height: 100vh;
  background: var(--bg);
  color: var(--ink);
}

/* ══════════════════════════════
   SIDEBAR
══════════════════════════════ */
#sidebar {
  width: 260px;
  flex-shrink: 0;
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#sidebar-header {
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#sidebar-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
}
#sidebar-logo-mark {
  width: 28px;
  height: 28px;
  border-radius: 7px;
  background: linear-gradient(135deg,#66AFFF,#66E2B0);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 800;
  color: #121213;
  letter-spacing: -.5px;
  flex-shrink: 0;
}
#sidebar-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -.2px;
}
#sidebar-sub {
  font-size: 10px;
  color: var(--ink-3);
  margin-top: 1px;
}
#search {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 7px 10px 7px 30px;
  font-size: 12px;
  color: var(--ink);
  outline: none;
  position: relative;
}
#search::placeholder { color: var(--ink-3); }
#search:focus { border-color: var(--blue); }
.search-wrap {
  position: relative;
}
.search-icon {
  position: absolute;
  left: 9px;
  top: 50%;
  transform: translateY(-50%);
  opacity: .4;
  pointer-events: none;
}

#nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0 16px;
}
#nav::-webkit-scrollbar { width: 4px; }
#nav::-webkit-scrollbar-track { background: transparent; }
#nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.cat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px 6px;
  cursor: pointer;
  user-select: none;
}
.cat-name {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.cat-arrow {
  transition: transform .2s;
  color: var(--ink-3);
  font-size: 9px;
}
.cat-header.collapsed .cat-arrow {
  transform: rotate(-90deg);
}
.cat-items {
  overflow: hidden;
}
.cat-items.collapsed {
  display: none;
}

.comp-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 16px;
  cursor: pointer;
  border-radius: 0;
  transition: background .15s;
  font-size: 13px;
  color: var(--ink-2);
}
.comp-item:hover { background: rgba(255,255,255,.04); color: var(--ink); }
.comp-item.active {
  background: var(--blue-bg);
  color: var(--blue);
}
.comp-item.active .comp-dot { background: var(--blue); }
.comp-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--border-m);
  flex-shrink: 0;
}
.comp-label { flex: 1; }
.comp-missing {
  font-size: 10px;
  color: var(--ink-3);
  opacity: .5;
}

#sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  font-size: 10px;
  color: var(--ink-3);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
#comp-count { font-variant-numeric: tabular-nums; }

/* ══════════════════════════════
   MAIN AREA
══════════════════════════════ */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

#main-header {
  height: 52px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
  background: var(--sidebar);
}
#comp-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#comp-cat-tag {
  font-size: 10px;
  color: var(--ink-3);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 2px 8px;
  flex-shrink: 0;
}

/* Theme toggle */
#theme-toggle {
  display: flex;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 2px;
  gap: 2px;
  flex-shrink: 0;
}
.theme-btn {
  padding: 4px 12px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--ink-3);
  transition: background .15s, color .15s;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 5px;
}
.theme-btn.active {
  background: var(--card);
  color: var(--ink);
}

/* Zoom controls */
#zoom-controls {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}
.zoom-btn {
  width: 28px;
  height: 28px;
  border-radius: var(--r);
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--ink-2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-family: inherit;
  transition: background .15s, color .15s;
}
.zoom-btn:hover { background: var(--card); color: var(--ink); }
.zoom-btn.active { background: var(--blue-bg); border-color: var(--blue-bdr); color: var(--blue); }
#zoom-label {
  font-size: 11px;
  color: var(--ink-3);
  min-width: 38px;
  text-align: center;
  font-variant-numeric: tabular-nums;
}

/* ── IMAGE PANE ── */
#image-pane {
  flex: 1;
  overflow: auto;
  position: relative;
  background: var(--bg);
  background-image:
    linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
  background-size: 32px 32px;
  cursor: grab;
  user-select: none;
}
#image-pane.dragging {
  cursor: grabbing;
}
#image-pane::-webkit-scrollbar { width: 8px; height: 8px; }
#image-pane::-webkit-scrollbar-track { background: transparent; }
#image-pane::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

#image-wrapper {
  min-height: 100%;
  min-width: max-content;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 32px;
}
#main-img {
  display: block;
  max-width: 100%;
  border-radius: 4px;
  box-shadow: 0 4px 24px rgba(0,0,0,.5);
  transform-origin: top center;
  transition: none;
}
#main-img.loading { opacity: 0; }
#main-img.ready { opacity: 1; transition: opacity .2s; }

/* Empty / loading states */
#empty-state {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  pointer-events: none;
}
#empty-state.hidden { display: none; }
.empty-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
}
.empty-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink-2);
}
.empty-sub {
  font-size: 12px;
  color: var(--ink-3);
  text-align: center;
  max-width: 240px;
  line-height: 1.6;
}

/* Keyboard hint */
#kb-hint {
  position: fixed;
  bottom: 16px;
  right: 20px;
  display: flex;
  gap: 8px;
  pointer-events: none;
  opacity: .5;
}
.kb {
  font-size: 10px;
  color: var(--ink-3);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 6px;
  font-family: monospace;
}


/* ══════════════════════════════
   MOBILE RESPONSIVE
══════════════════════════════ */
#mob-toolbar { display: none; }

#mob-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 150;
  background: rgba(0,0,0,.55);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  opacity: 0;
  transition: opacity .3s;
  pointer-events: none;
}
#mob-backdrop.active {
  opacity: 1;
  pointer-events: all;
}
#mob-menu-btn {
  display: none;
  align-items: center;
  justify-content: center;
  width: 32px; height: 32px;
  border-radius: var(--r);
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--ink-2);
  cursor: pointer;
  flex-shrink: 0;
  font-size: 17px;
  line-height: 1;
  padding: 0;
  font-family: inherit;
  transition: background .15s, color .15s;
}
#mob-menu-btn:hover { background: var(--card); color: var(--ink); }

@media (max-width: 640px) {
  #kb-hint { display: none; }

  /* Sidebar becomes a slide-in overlay */
  #sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 200;
    transform: translateX(-100%);
    transition: transform .28s cubic-bezier(.4,0,.2,1);
    width: 280px;
  }
  #sidebar.mob-open {
    transform: translateX(0);
    box-shadow: 8px 0 40px rgba(0,0,0,.6);
  }
  #mob-toolbar { display: none; }

#mob-backdrop { display: block; }

  /* Show hamburger button in header */
  #mob-menu-btn { display: flex; }

  /* Compact header: hide zoom label text, shrink buttons */
  #zoom-label { display: none; }
  .zoom-btn { width: 26px; height: 26px; }
  .theme-btn { padding: 4px 8px; font-size: 10px; }
  #main-header { padding: 0 12px; gap: 8px; }

  /* Hide desktop controls — moved to floating toolbar */
  #theme-toggle { display: none; }
  #zoom-controls { display: none; }

  /* Floating bottom toolbar */
  #mob-toolbar {
    display: flex;
    align-items: center;
    gap: 2px;
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    background: rgba(26,27,30,.94);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--border-m);
    border-radius: 999px;
    padding: 5px 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.04);
    white-space: nowrap;
  }
  .mob-tb-zoom { width: 32px; height: 32px; background: transparent; border-color: transparent; font-size: 18px; }
  .mob-tb-zoom:hover { background: rgba(255,255,255,.07); border-color: transparent; }
  .mob-tb-zoom.btn-fit-sync { font-size: 11px; font-weight: 700; width: auto; padding: 0 10px; }
  .mob-tb-label { font-size: 11px; color: var(--ink-3); min-width: 34px; text-align: center; font-variant-numeric: tabular-nums; }
  .mob-tb-sep { width: 1px; height: 18px; background: var(--border); margin: 0 6px; flex-shrink: 0; }
  .mob-tb-theme { padding: 5px 12px; font-size: 11px; }
}

/* Search highlight */
.comp-item.hidden { display: none; }
.cat-section.all-hidden .cat-items { display: none; }
</style>
</head>
<body>
<div id="mob-backdrop" onclick="closeMobileSidebar()"></div>
<div id="app">

  <!-- ═══ SIDEBAR ═══ -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <div id="sidebar-logo">
        <div id="sidebar-logo-mark">LX</div>
        <div>
          <div id="sidebar-title">LUX 2.0</div>
          <div id="sidebar-sub">Design System Viewer</div>
        </div>
      </div>
      <div class="search-wrap">
        <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="search" type="text" placeholder="Search components…" autocomplete="off" spellcheck="false"/>
      </div>
    </div>

    <nav id="nav">
      <!-- Built by JS -->
    </nav>

    <div id="sidebar-footer">
      <span id="comp-count">— components</span>
      <span>↑↓ navigate</span>
    </div>
  </aside>

  <!-- ═══ MAIN ═══ -->
  <main id="main">
    <div id="main-header">
      <button id="mob-menu-btn" onclick="toggleMobileSidebar()" aria-label="Open component list">&#9776;</button>
      <span id="comp-title">Select a component</span>
      <span id="comp-cat-tag" style="display:none;"></span>

      <div id="theme-toggle">
        <button class="theme-btn" data-theme="Dark" onclick="setTheme('Dark')">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          Dark
        </button>
        <button class="theme-btn active" data-theme="Light" onclick="setTheme('Light')">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          Light
        </button>
      </div>

      <div id="zoom-controls">
        <button class="zoom-btn" onclick="zoomOut()" title="Zoom out">−</button>
        <span id="zoom-label" class="zoom-label-sync">Fit</span>
        <button class="zoom-btn" onclick="zoomIn()" title="Zoom in">+</button>
        <button class="zoom-btn active btn-fit-sync" id="btn-fit" onclick="setZoomFit()" title="Fit width" style="width:auto;padding:0 8px;font-size:11px;">Fit</button>
        <button class="zoom-btn" onclick="setZoom(1)" title="Actual size" style="width:auto;padding:0 8px;font-size:11px;">1×</button>
      </div>
    </div>

    <div id="image-pane">
      <div id="image-wrapper">
        <img id="main-img" src="" alt="" draggable="false"/>
      </div>
      <div id="empty-state">
        <div class="empty-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>
        </div>
        <div class="empty-title">No component selected</div>
        <div class="empty-sub">Pick a component from the sidebar to preview it here.</div>
      </div>
    </div>

  <!-- ═══ MOBILE FLOATING TOOLBAR ═══ -->
  <div id="mob-toolbar">
    <button class="zoom-btn mob-tb-zoom btn-fit-sync" onclick="setZoomFit()" title="Fit">Fit</button>
    <button class="zoom-btn mob-tb-zoom" onclick="zoomOut()" title="Zoom out">−</button>
    <span class="mob-tb-label zoom-label-sync">Fit</span>
    <button class="zoom-btn mob-tb-zoom" onclick="zoomIn()" title="Zoom in">+</button>
    <div class="mob-tb-sep"></div>
    <button class="theme-btn mob-tb-theme" data-theme="Dark" onclick="setTheme('Dark')">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      D
    </button>
    <button class="theme-btn mob-tb-theme active" data-theme="Light" onclick="setTheme('Light')">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      L
    </button>
  </div>

  </main>
</div>

<div id="kb-hint">
  <span class="kb">↑↓</span><span class="kb">+−</span><span class="kb">D/L</span>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  DATA — add categories and components here
//  Format: { id, label, file }
//  file = the part before ' _ Dark.png' / ' _ Light.png'
// ═══════════════════════════════════════════════════════
const CATEGORIES = [
  {
    id: 'foundations',
    name: 'Foundations',
    folder: 'images/viewer/Foundations',
    components: [
      { id: 'container',    label: 'Container',    file: 'Container'    },
      { id: 'layout',       label: 'Layout',       file: 'Layout'       },
      { id: 'text-content', label: 'Text Content', file: 'Text Content' },
    ]
  },
  {
    id: 'components',
    name: 'Components',
    folder: 'images/viewer/Components',
    components: [
      // Buttons
      { id: 'dialog-button',   label: 'Dialog Button',   file: 'Dialog Button',   subfolder: 'Buttons' },
      { id: 'icon-button',     label: 'Icon Button',     file: 'Icon Button',     subfolder: 'Buttons' },
      { id: 'split-button',    label: 'Split Button',    file: 'Split Button',    subfolder: 'Buttons' },
      // Cards
      { id: 'card',            label: 'Card',            file: 'Card',            subfolder: 'Cards' },
      // Chiclet
      { id: 'chiclet',         label: 'Chiclet',         file: 'Chiclet',         subfolder: 'Chiclet' },
      // Chips
      { id: 'chips',           label: 'Chips',           file: 'Chips',           subfolder: 'Chips' },
      // Form Inputs
      { id: 'combo-box',       label: 'Combo Box',       file: 'Combo Box',       subfolder: 'Form Inputs' },
      { id: 'dropdown-menu',   label: 'Drop-down Menu',  file: 'Drop-down Menu',  subfolder: 'Form Inputs' },
      { id: 'inline-input',    label: 'Inline Input',    file: 'Inline Input',    subfolder: 'Form Inputs' },
      { id: 'label',           label: 'Label',           file: 'Label',           subfolder: 'Form Inputs' },
      { id: 'numeric-stepper', label: 'Numeric Stepper', file: 'Numeric Stepper', subfolder: 'Form Inputs' },
      { id: 'password-field',  label: 'Password Field',  file: 'Password Field',  subfolder: 'Form Inputs' },
      { id: 'tag-input',       label: 'Tag Input',       file: 'Tag Input',       subfolder: 'Form Inputs' },
      { id: 'text-area-editor',label: 'Text Area Editor',file: 'Text Area Editor',subfolder: 'Form Inputs' },
      { id: 'text-area',       label: 'Text Area',       file: 'Text Area',       subfolder: 'Form Inputs' },
      { id: 'text-field',      label: 'Text Field',      file: 'Text Field',      subfolder: 'Form Inputs' },
      // Hint
      { id: 'hint',            label: 'Hint',            file: 'Hint',            subfolder: 'Hint' },
      // Links
      { id: 'back-to-page',    label: 'Back to Page',    file: 'Back to Page',    subfolder: 'Links' },
      { id: 'breadcrumbs',     label: 'Breadcrumbs',     file: 'Breadcrumbs',     subfolder: 'Links' },
      { id: 'text-link',       label: 'Text Link',       file: 'Text Link',       subfolder: 'Links' },
      // Menu
      { id: 'action-menu',     label: 'Action Menu',     file: 'Action Menu',     subfolder: 'Menu' },
      { id: 'menu',            label: 'Menu',            file: 'Menu',            subfolder: 'Menu' },
      // Message Bar
      { id: 'message-bar',     label: 'Message Bar',     file: 'Message Bar',     subfolder: 'Message Bar' },
      // Nest View
      { id: 'independent-tree',label: 'Independent Tree',file: 'Independent Tree',subfolder: 'Nest View' },
      { id: 'list',            label: 'List',            file: 'List',            subfolder: 'Nest View' },
      { id: 'tree',            label: 'Tree',            file: 'Tree',            subfolder: 'Nest View' },
      // Pagination
      { id: 'pagination',      label: 'Pagination',      file: 'Pagination',      subfolder: 'Pagination' },
      // Pickers
      { id: 'date-picker',     label: 'Date Picker',     file: 'Date Picker',     subfolder: 'Pickers' },
      { id: 'time-picker',     label: 'Time Picker',     file: 'Time Picker',     subfolder: 'Pickers' },
      // Progress Indicator
      { id: 'circular-progress',  label: 'Circular Progress',  file: 'Circular Progress Indicator',  subfolder: 'Progress Indicator' },
      { id: 'linear-progress',    label: 'Linear Progress',    file: 'Linear Progress Indicator',    subfolder: 'Progress Indicator' },
      // Scrollbar
      { id: 'scrollbar',       label: 'Scrollbar',       file: 'Scrollbar',       subfolder: 'Scrollbar' },
      // Segmented Control
      { id: 'segmented-control',label: 'Segmented Control',file: 'Segmented Control',subfolder: 'Segmented Control' },
      // Selection Controls
      { id: 'checkbox',            label: 'Checkbox',             file: 'Checkbox',             subfolder: 'Selection Controls' },
      { id: 'radio-button',        label: 'Radio Button',         file: 'Radio Button',         subfolder: 'Selection Controls' },
      { id: 'selection-ctrl-group',label: 'Selection Ctrl Group', file: 'Selection Control Group', subfolder: 'Selection Controls' },
      // Snackbar
      { id: 'snackbar',        label: 'Snackbar',        file: 'Snackbar',        subfolder: 'Snackbar' },
      // Switch
      { id: 'switch',          label: 'Switch',          file: 'Switch',          subfolder: 'Switch' },
      // Tabs

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let state = {
  catId: null,
  compId: null,
  theme: 'Light',
  zoom: 'fit',
  zoomLevel: 1,
};

// ═══════════════════════════════════════════════════════
//  BUILD SIDEBAR
// ═══════════════════════════════════════════════════════
function buildSidebar() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';

  let total = 0;

  CATEGORIES.forEach(cat => {
    total += cat.components.length;

    const section = document.createElement('div');
    section.className = 'cat-section';
    section.dataset.catId = cat.id;

    const header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = `<span class="cat-name">${cat.name}</span><span class="cat-arrow">▾</span>`;
    header.addEventListener('click', () => toggleCat(header));

    const items = document.createElement('div');
    items.className = 'cat-items';

    cat.components.forEach(comp => {
      const item = document.createElement('div');
      item.className = 'comp-item';
      item.dataset.catId = cat.id;
      item.dataset.compId = comp.id;
      item.innerHTML = `<span class="comp-dot"></span><span class="comp-label">${comp.label}</span>`;
      item.addEventListener('click', () => selectComp(cat.id, comp.id));
      items.appendChild(item);
    });

    section.appendChild(header);
    section.appendChild(items);
    nav.appendChild(section);
  });

  document.getElementById('comp-count').textContent = `${total} component${total !== 1 ? 's' : ''}`;
}

function toggleCat(header) {
  header.classList.toggle('collapsed');
  header.nextElementSibling.classList.toggle('collapsed');
}

// ═══════════════════════════════════════════════════════
//  SELECT COMPONENT
// ═══════════════════════════════════════════════════════
function selectComp(catId, compId) {
  state.catId = catId;
  state.compId = compId;

  // Update sidebar active state
  document.querySelectorAll('.comp-item').forEach(el => {
    el.classList.toggle('active', el.dataset.catId === catId && el.dataset.compId === compId);
  });

  // Find data
  const cat = CATEGORIES.find(c => c.id === catId);
  const comp = cat.components.find(c => c.id === compId);

  // Update header
  document.getElementById('comp-title').textContent = comp.label;
  const tag = document.getElementById('comp-cat-tag');
  tag.textContent = cat.name;
  tag.style.display = '';

  // Load image
  loadImage(cat, comp);

  // Hide empty state
  document.getElementById('empty-state').classList.add('hidden');

  // Auto-close sidebar on mobile after selection
  if (window.innerWidth <= 640) closeMobileSidebar();
}

// ═══════════════════════════════════════════════════════
//  LOAD IMAGE
// ═══════════════════════════════════════════════════════
function buildPath(cat, comp, theme) {
  const sub = comp.subfolder ? `/${comp.subfolder}` : '';
  return `${cat.folder}${sub}/${comp.file} _ ${theme}.png`;
}

function buildEncodedPath(cat, comp, theme) {
  const folderParts = cat.folder.split('/');
  let encoded = folderParts.map(p => encodeURIComponent(p)).join('/');
  if (comp.subfolder) encoded += '/' + encodeURIComponent(comp.subfolder);
  encoded += '/' + encodeURIComponent(`${comp.file} _ ${theme}.png`);
  return encoded;
}

function loadImage(cat, comp) {
  const img = document.getElementById('main-img');
  img.style.display = 'block';
  img.classList.remove('ready');
  img.classList.add('loading');
  document.getElementById('empty-state').classList.add('hidden');

  const path = buildPath(cat, comp, state.theme);
  img.src = path;

  img.onload = () => {
    img.classList.remove('loading');
    img.classList.add('ready');
    if (state.zoom === 'fit') applyFitAll();
  };
  img._rawPath = path;
  img._encodedPath = buildEncodedPath(cat, comp, state.theme);
  img._triedEncoded = false;

  img.onerror = () => {
    // First failure: try the URL-encoded version as fallback
    if (!img._triedEncoded) {
      img._triedEncoded = true;
      img.src = img._encodedPath;
      return;
    }
    // Both failed — show error with full URLs for debugging
    img.classList.remove('loading');
    img.style.display = 'none';
    const absRaw = new URL(img._rawPath, window.location.href).href;
    const absEnc = new URL(img._encodedPath, window.location.href).href;
    document.getElementById('empty-state').innerHTML = `
      <div class="empty-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,100,100,.5)" stroke-width="1.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
      <div class="empty-title">Image not found</div>
      <div class="empty-sub" style="font-family:monospace;font-size:10px;word-break:break-all;margin-bottom:6px;"><b>tried 1:</b> ${absRaw}</div>
      <div class="empty-sub" style="font-family:monospace;font-size:10px;word-break:break-all;"><b>tried 2:</b> ${absEnc}</div>
    `;
    document.getElementById('empty-state').classList.remove('hidden');
  };
}

// ═══════════════════════════════════════════════════════
//  THEME
// ═══════════════════════════════════════════════════════
function setTheme(theme) {
  state.theme = theme;
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.theme === theme);
  });
  if (state.catId && state.compId) {
    const img = document.getElementById('main-img');
    img.style.display = 'block';
    const cat = CATEGORIES.find(c => c.id === state.catId);
    const comp = cat.components.find(c => c.id === state.compId);
    loadImage(cat, comp);
  }
}

// ═══════════════════════════════════════════════════════
//  ZOOM
// ═══════════════════════════════════════════════════════
function applyFitAll() {
  const img     = document.getElementById('main-img');
  const pane    = document.getElementById('image-pane');
  const wrapper = document.getElementById('image-wrapper');
  const pad     = 48; // padding on each side

  const availW = pane.clientWidth  - pad * 2;
  const availH = pane.clientHeight - pad * 2;
  const natW   = img.naturalWidth;
  const natH   = img.naturalHeight;

  if (natW === 0 || natH === 0) return;

  // Scale to fit both dimensions — whichever is the limiting one
  const scale = Math.min(1, availW / natW, availH / natH);

  img.style.maxWidth  = 'none';
  img.style.width     = (natW * scale) + 'px';
  img.style.transform = '';
  wrapper.style.alignItems    = 'center';
  wrapper.style.justifyContent = 'center';
  wrapper.style.minHeight     = '100%';
  wrapper.style.padding       = pad + 'px';

  state.zoomLevel = scale;
  state.zoom = 'fit';
  updateZoomLabel(scale >= 1 ? '100%' : Math.round(scale * 100) + '%');
  updateFitBtn(true);
}

function applyFitWidth() {
  applyFitAll();
}

function setZoomFit() {
  applyFitAll();
}

function setZoom(level) {
  state.zoom = 'manual';
  state.zoomLevel = level;
  updateFitBtn(false);

  const img = document.getElementById('main-img');
  const wrapper = document.getElementById('image-wrapper');

  img.style.maxWidth = 'none';
  img.style.width = (img.naturalWidth * level) + 'px';
  img.style.transform = '';
  wrapper.style.padding = '32px';

  updateZoomLabel(Math.round(level * 100) + '%');
}

function zoomIn() {
  const levels = [.1,.15,.2,.25,.33,.5,.67,.75,1,1.25,1.5,2];
  const cur = state.zoomLevel;
  const next = levels.find(l => l > cur + 0.001) || 2;
  setZoom(next);
}

function zoomOut() {
  const levels = [.1,.15,.2,.25,.33,.5,.67,.75,1,1.25,1.5,2];
  const cur = state.zoomLevel;
  const prev = [...levels].reverse().find(l => l < cur - 0.001) || .1;
  setZoom(prev);
}

// ═══════════════════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════════════════
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  let visibleCount = 0;

  document.querySelectorAll('.cat-section').forEach(section => {
    const catId = section.dataset.catId;
    let catVisible = 0;

    section.querySelectorAll('.comp-item').forEach(item => {
      const label = item.querySelector('.comp-label').textContent.toLowerCase();
      const matches = !q || label.includes(q);
      item.classList.toggle('hidden', !matches);
      if (matches) catVisible++;
    });

    // Show/hide entire category if no matches
    const itemsEl = section.querySelector('.cat-items');
    if (q && catVisible === 0) {
      section.style.display = 'none';
    } else {
      section.style.display = '';
      if (q) { // expand on search
        section.querySelector('.cat-header').classList.remove('collapsed');
        itemsEl.classList.remove('collapsed');
      }
    }

    visibleCount += catVisible;
  });
});

// ═══════════════════════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target === document.getElementById('search')) return;

  const allItems = [...document.querySelectorAll('.comp-item:not(.hidden)')];
  const cur = allItems.findIndex(el => el.classList.contains('active'));

  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
    e.preventDefault();
    const next = cur < allItems.length - 1 ? allItems[cur + 1] : allItems[0];
    next.click();
    next.scrollIntoView({ block: 'nearest' });
  }
  if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    e.preventDefault();
    const prev = cur > 0 ? allItems[cur - 1] : allItems[allItems.length - 1];
    prev.click();
    prev.scrollIntoView({ block: 'nearest' });
  }
  if (e.key === 'd' || e.key === 'D') setTheme('Dark');
  if (e.key === 'l' || e.key === 'L') setTheme('Light');

  // Zoom — always preventDefault so Cmd+/- never triggers browser zoom
  if (e.key === '+' || e.key === '=') { e.preventDefault(); zoomIn(); }
  if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
  if (e.key === '0')                  { e.preventDefault(); setZoomFit(); }
  if (e.key === '1')                  { e.preventDefault(); setZoom(1); }
});

// Resize → re-fit
window.addEventListener('resize', () => {
  if (state.zoom === 'fit') applyFitAll();
});

// ═══════════════════════════════════════════════════════
//  DRAG TO PAN
// ═══════════════════════════════════════════════════════
(function() {
  const pane = document.getElementById('image-pane');
  let isDragging = false;
  let startX, startY, scrollLeft, scrollTop;

  pane.addEventListener('mousedown', e => {
    // Only drag with left button, not on interactive elements
    if (e.button !== 0) return;
    isDragging = true;
    startX = e.clientX;
    startY = e.clientY;
    scrollLeft = pane.scrollLeft;
    scrollTop  = pane.scrollTop;
    pane.classList.add('dragging');
    e.preventDefault();
  });

  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    pane.scrollLeft = scrollLeft - dx;
    pane.scrollTop  = scrollTop  - dy;
  });

  window.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;
    pane.classList.remove('dragging');
  });

  // Cancel drag if mouse leaves window
  window.addEventListener('mouseleave', () => {
    isDragging = false;
    pane.classList.remove('dragging');
  });
})();

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
buildSidebar();

// Auto-select first component
if (CATEGORIES.length > 0 && CATEGORIES[0].components.length > 0) {
  const first = CATEGORIES[0].components[0];
  selectComp(CATEGORIES[0].id, first.id);
}

// ── MOBILE SIDEBAR TOGGLE ──
function toggleMobileSidebar() {
  const sidebar  = document.getElementById('sidebar');
  const backdrop = document.getElementById('mob-backdrop');
  if (sidebar.classList.contains('mob-open')) {
    closeMobileSidebar();
  } else {
    sidebar.classList.add('mob-open');
    backdrop.classList.add('active');
  }
}
function closeMobileSidebar() {
  document.getElementById('sidebar').classList.remove('mob-open');
  document.getElementById('mob-backdrop').classList.remove('active');
}


// ── SYNC HELPERS (desktop + mobile labels) ──
function updateZoomLabel(text) {
  document.querySelectorAll('.zoom-label-sync').forEach(el => el.textContent = text);
}
function updateFitBtn(active) {
  document.querySelectorAll('.btn-fit-sync').forEach(el => el.classList.toggle('active', active));
}
