<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUX 2.0 Docs</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: #0d1117;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    color: #c9d1d9; }

  .shell { display: flex; height: 100%; }

  /* ── NAV ── */
  .nav {
    width: 186px; flex-shrink: 0;
    border-right: 1px solid #1a2030;
    overflow-y: auto; padding: 16px 0;
    scrollbar-width: none;
  }
  .nav::-webkit-scrollbar { display: none; }
  .nav-group { margin-bottom: 4px; }
  .nav-group-label {
    font-size: 9.5px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: #2d3444; padding: 10px 16px 4px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 9px;
    padding: 6px 16px; font-size: 12.5px; color: #586069;
    cursor: pointer; border-left: 2px solid transparent;
    transition: color 0.12s, background 0.12s; user-select: none;
  }
  .nav-item:hover { color: #c9d1d9; background: rgba(255,255,255,0.025); }
  .nav-item.active {
    color: #e2e8f0; background: rgba(124,58,237,0.1);
    border-left-color: #7c3aed;
    font-weight: 500;
  }
  .nav-dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; opacity: 0.35; flex-shrink: 0; }
  .nav-item.active .nav-dot { opacity: 1; background: #9d71f8; }

  /* ── DOC PANEL ── */
  .doc {
    flex: 1; overflow-y: auto; padding: 0;
    scrollbar-width: thin; scrollbar-color: #1e2636 transparent;
  }
  .doc::-webkit-scrollbar { width: 3px; }
  .doc::-webkit-scrollbar-thumb { background: #1e2636; border-radius: 3px; }

  /* Header band */
  .doc-header {
    padding: 24px 28px 20px;
    border-bottom: 1px solid #1a2030;
    position: relative;
    overflow: hidden;
  }
  .doc-header::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--hue, rgba(124,58,237,0.04));
    pointer-events: none;
  }
  .doc-meta {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px;
  }
  .doc-badge {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 4px;
    background: var(--badge-bg, rgba(124,58,237,0.15));
    color: var(--badge-fg, #9d71f8);
  }
  .doc-breadcrumb { font-size: 11px; color: #3d444d; }
  .doc-title {
    font-size: 21px; font-weight: 700;
    color: #f0f6fc; letter-spacing: -0.025em;
    line-height: 1.2; margin-bottom: 10px;
  }
  .doc-desc {
    font-size: 12.5px; line-height: 1.75;
    color: #6e7681; max-width: 480px;
  }

  /* Body */
  .doc-body { padding: 20px 28px 28px; }

  .doc-section { margin-bottom: 22px; }
  .doc-section-label {
    font-size: 9.5px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: #3d444d; margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid #1a2030;
    display: flex; align-items: center; gap: 6px;
  }

  /* Anatomy */
  .anatomy-list { display: flex; flex-direction: column; gap: 3px; }
  .anatomy-item {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 12px; color: #8b949e; padding: 6px 0;
    border-bottom: 1px solid #10161e;
  }
  .anatomy-item:last-child { border-bottom: none; }
  .anatomy-num {
    font-size: 10px; font-weight: 600; color: #3d444d;
    background: #161b22; border: 1px solid #30363d;
    width: 18px; height: 18px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .anatomy-name { color: #c9d1d9; font-weight: 500; }
  .anatomy-sep { color: #4a5568; margin: 0 4px; }

  /* States */
  .states-row { display: flex; flex-wrap: wrap; gap: 5px; }
  .state-chip {
    font-size: 11px; padding: 3px 9px; border-radius: 5px;
    background: #161b22; border: 1px solid #21262d;
    color: #6e7681;
  }

  /* Behavior */
  .behavior-item {
    display: flex; gap: 10px; align-items: flex-start;
    font-size: 12px; line-height: 1.7;
    color: #8b949e; padding: 7px 0;
    border-bottom: 1px solid #10161e;
  }
  .behavior-item:last-child { border-bottom: none; }
  .behavior-icon { color: #9d71f8; flex-shrink: 0; margin-top: 3px; font-size: 8px; opacity: 0.6; }

  /* Tokens */
  .token-list { display: flex; flex-direction: column; gap: 0; }
  .token-row {
    display: flex; align-items: baseline; gap: 10px;
    padding: 6px 0;
    border-bottom: 1px solid #10161e;
    font-size: 11.5px;
  }
  .token-row:last-child { border-bottom: none; }
  .token-name {
    font-family: ui-monospace, 'Fira Code', monospace;
    font-size: 10.5px; color: #79c0ff;
    background: rgba(56, 139, 253, 0.06);
    border: 1px solid rgba(56, 139, 253, 0.1);
    padding: 1px 6px; border-radius: 4px;
    white-space: nowrap; flex-shrink: 0;
  }
  .token-desc { color: #6e7681; line-height: 1.5; }

  /* Do / Don't grid — interleaved pairs */
  .usage-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .rule {
    display: flex; gap: 8px; align-items: flex-start;
    padding: 9px 11px; border-radius: 7px;
    font-size: 11.5px; line-height: 1.5;
  }
  .rule.do   { background: rgba(35,134,54,0.08); border: 1px solid rgba(35,134,54,0.12); color: #7ee787; }
  .rule.dont { background: rgba(218,54,51,0.08); border: 1px solid rgba(218,54,51,0.12); color: #ffa198; }
  .rule-icon { font-size: 10px; flex-shrink: 0; margin-top: 2px; font-weight: 700; }
  .rule.do   .rule-icon { color: #2ea043; }
  .rule.dont .rule-icon { color: #cf222e; }

  /* Keyboard */
  .key-table { width: 100%; border-collapse: collapse; }
  .key-table tr { border-bottom: 1px solid #10161e; }
  .key-table tr:last-child { border-bottom: none; }
  .key-table td { padding: 6px 0; font-size: 11.5px; vertical-align: top; }
  .key-table td:first-child { width: 44%; padding-right: 12px; }
  .kbd {
    display: inline-flex; align-items: center;
    background: #161b22; border: 1px solid #30363d;
    border-bottom-width: 2px; border-radius: 4px;
    padding: 1px 6px; font-size: 10.5px; color: #8b949e;
    font-family: ui-monospace, monospace; white-space: nowrap;
    margin-right: 3px;
  }
  .key-desc { color: #6e7681; }
</style>
</head>

function kbdHtml(keys) {
  return keys.map(k => `<span class="kbd">${k}</span>`).join('');
}

function render(id) {
  const d = DATA[id];
  if (!d) return;
  const cat = CATS[d.section] || CATS.Components;

  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  document.querySelector(`.nav-item[data-id="${id}"]`).classList.add('active');

  const keyboardSection = d.keyboard.length ? `
    <div class="doc-section">
      <div class="doc-section-label">Keyboard</div>
      <table class="key-table">
        ${d.keyboard.map(([keys, desc]) => `
          <tr>
            <td>${kbdHtml(keys)}</td>
            <td class="key-desc">${desc}</td>
          </tr>`).join('')}
      </table>
    </div>` : '';

  // Interleave do/don't so they appear as pairs: [do, dont] per row
  const maxRules = Math.max(d.do.length, d.dont.length);
  let usageRows = '';
  for (let i = 0; i < maxRules; i++) {
    usageRows += d.do[i]   ? `<div class="rule do"><span class="rule-icon">✓</span><span>${d.do[i]}</span></div>` : '<div></div>';
    usageRows += d.dont[i] ? `<div class="rule dont"><span class="rule-icon">✕</span><span>${d.dont[i]}</span></div>` : '<div></div>';
  }

  document.getElementById('doc').innerHTML = `
    <div class="doc-header" style="--hue:${cat.hue};">
      <div class="doc-meta">
        <span class="doc-badge" style="--badge-bg:${cat.badgeBg};--badge-fg:${cat.badgeFg};">${d.section}</span>
        <span class="doc-breadcrumb">LUX 2.0 / ${d.section} / ${d.title}</span>
      </div>
      <div class="doc-title">${d.title}</div>
      <div class="doc-desc">${d.desc}</div>
    </div>
    <div class="doc-body">

      <div class="doc-section">
        <div class="doc-section-label">Anatomy</div>
        <div class="anatomy-list">
          ${d.anatomy.map(([name, desc], i) => `
            <div class="anatomy-item">
              <span class="anatomy-num">${i + 1}</span>
              <span><span class="anatomy-name">${name}</span><span class="anatomy-sep"> — </span>${desc}</span>
            </div>`).join('')}
        </div>
      </div>

      <div class="doc-section">
        <div class="doc-section-label">States</div>
        <div class="states-row">
          ${d.states.map(s => `<span class="state-chip">${s}</span>`).join('')}
        </div>
      </div>

      <div class="doc-section">
        <div class="doc-section-label">Behavior</div>
        ${d.behavior.map(b => `
          <div class="behavior-item">
            <span class="behavior-icon">▸</span>
            <span>${b}</span>
          </div>`).join('')}
      </div>

      ${keyboardSection}

      <div class="doc-section">
        <div class="doc-section-label">Design Tokens</div>
        <div class="token-list">
          ${d.tokens.map(([name, desc]) => `
            <div class="token-row">
              <span class="token-name">${name}</span>
              <span class="token-desc">${desc}</span>
            </div>`).join('')}
        </div>
      </div>

      <div class="doc-section">
        <div class="doc-section-label">Usage</div>
        <div class="usage-grid">${usageRows}</div>
      </div>

    </div>`;
  document.getElementById('doc').scrollTop = 0;
}

document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => render(item.dataset.id));
});
render('action-menu');
</script>
